const h=React.createElement;

const DRIVETRAINS=["RWD","FWD","AWD"],ENGINE_POS=["Front","Mid","Rear"],TIRES=["Street","Sport","Race","Slicks"],GEAR_COUNTS=[4,5,6,7,8],TIRE_K=0.0744;
const GEAR_RANGES={1:[2,5],2:[1.5,3.5],3:[1,2.5],4:[0.8,2],5:[0.6,1.5],6:[0.5,1.2],7:[0.5,1],8:[0.5,0.9],FD:[2,6]};

function clamp(v,lo,hi){return Math.min(hi,Math.max(lo,v))}
function pct(v){return Math.round(v*100)}
function fmt(v){return Math.round(v*10)/10}
function fmtG(v){return Math.round(v*100)/100}
function calcVal(mn,mx,p){return mn+(mx-mn)*p}
function twMod(w){return(w-245)/245}
function snap5(v){return Math.round(v*2)/2}

const HIGH_PTW=0.28;

function getArchetype(enginePos,drivetrain,ptw){
  const tier=ptw>=HIGH_PTW?"high":"low";
  const key=enginePos+"_"+drivetrain+"_"+tier;
  const map={
    "Front_RWD_high":{camberF:-1.2,camberR:-1.3,pressF:24.0,pressR:25.0,conf:"tested"},
    "Front_AWD_low": {camberF:-1.2,camberR:-1.0,pressF:26.5,pressR:26.5,conf:"tested"},
    "Mid_RWD_high":  {camberF:-1.5,camberR:-1.3,pressF:23.0,pressR:23.0,conf:"tested"},
    "Mid_RWD_low":   {camberF:-1.2,camberR:-1.0,pressF:27.5,pressR:27.5,conf:"tested"},
    "Front_RWD_low": {camberF:-1.2,camberR:-1.1,pressF:25.5,pressR:26.0,conf:"theory"},
    "Front_AWD_high":{camberF:-1.3,camberR:-1.1,pressF:26.0,pressR:26.0,conf:"theory"},
    "Front_FWD_high":{camberF:-1.4,camberR:-0.8,pressF:25.0,pressR:27.0,conf:"theory"},
    "Front_FWD_low": {camberF:-1.2,camberR:-0.8,pressF:26.0,pressR:27.0,conf:"theory"},
    "Mid_AWD_high":  {camberF:-1.4,camberR:-1.2,pressF:24.0,pressR:24.0,conf:"theory"},
    "Mid_AWD_low":   {camberF:-1.2,camberR:-1.0,pressF:26.5,pressR:26.5,conf:"theory"},
    "Mid_FWD_high":  {camberF:-1.5,camberR:-0.8,pressF:24.0,pressR:26.0,conf:"theory"},
    "Mid_FWD_low":   {camberF:-1.3,camberR:-0.8,pressF:26.0,pressR:27.0,conf:"theory"},
    "Rear_RWD_high": {camberF:-1.3,camberR:-1.4,pressF:24.0,pressR:23.5,conf:"theory"},
    "Rear_RWD_low":  {camberF:-1.1,camberR:-1.2,pressF:26.5,pressR:26.0,conf:"theory"},
    "Rear_AWD_high": {camberF:-1.3,camberR:-1.3,pressF:24.0,pressR:24.0,conf:"theory"},
    "Rear_AWD_low":  {camberF:-1.1,camberR:-1.1,pressF:26.5,pressR:26.5,conf:"theory"},
    "Rear_FWD_high": {camberF:-1.4,camberR:-0.8,pressF:24.5,pressR:26.5,conf:"theory"},
    "Rear_FWD_low":  {camberF:-1.2,camberR:-0.8,pressF:26.0,pressR:27.0,conf:"theory"},
  };
  return map[key]||{camberF:-1.2,camberR:-1.1,pressF:26.0,pressR:26.5,conf:"theory"};
}

function scaleCamberForCompound(base,tc){
  if(tc==="Slicks")return base;
  if(tc==="Race")return base-0.1;
  if(tc==="Sport")return base-0.2;
  return base-0.3;
}
function scalePressureForCompound(base,tc){
  if(tc==="Slicks")return base;
  if(tc==="Race")return base+0.5;
  if(tc==="Sport")return base+2.0;
  return base+3.5;
}

function calcChassis(inp,eOff,xOff){
  const{weightFront:wF,hp,weightLbs,drivetrain:dt,enginePos:ep,tireCompound:tc,hasAero,tireWidthF,tireWidthR,isController}=inp;
  const wR=100-wF,hpw=hp/Math.max(weightLbs,1),twF=twMod(tireWidthF||245),twR=twMod(tireWidthR||275),ctrl=isController?1:0;
  const tSt={Street:0,Sport:.03,Race:.05,Slicks:.07},tAR={Street:0,Sport:.04,Race:.07,Slicks:.10};
  const tDM={Street:0,Sport:.02,Race:.04,Slicks:.06};
  let pm=hpw>=.35?.05:hpw>=.2?.03:.01;
  let fS=wF/100+tSt[tc]+twF*.03,rS=wR/100+tSt[tc]+twR*.03;
  if(dt==="RWD")rS+=pm;else if(dt==="FWD")fS+=pm;else{fS+=pm*.4;rS+=pm*.6}
  if(!hasAero){fS+=.02;rS+=.02}
  fS-=eOff*.005;rS+=xOff*.005;fS-=ctrl*.03;rS-=ctrl*.015;
  fS=clamp(fS,.15,.85);rS=clamp(rS,.15,.85);
  let fA=wF/100+.03+tAR[tc]+twF*.02,rA=wR/100+.03+tAR[tc]+twR*.02;
  if(dt==="RWD")rA+=.02;else if(dt==="FWD")fA+=.02;
  if(!hasAero){fA+=.03;rA+=.03}
  fA-=eOff*.008;rA+=xOff*.008;fA-=ctrl*.04;rA-=ctrl*.02;
  fA=clamp(fA,.15,.9);rA=clamp(rA,.15,.9);
  const db=.55+tDM[tc]-ctrl*.04;
  let rbF=clamp(db+(wF-50)*.003,.4,.8),rbR=clamp(db+(wR-50)*.003,.4,.8);
  rbF-=eOff*.004;rbR+=xOff*.004;rbF=clamp(rbF,.4,.8);rbR=clamp(rbR,.4,.8);
  const bpF=clamp(rbF*.55,.2,.55),bpR=clamp(rbR*.55,.2,.55);
  let toeF=0,toeR=0;
  if(dt==="RWD")toeR=.1;else if(dt==="FWD")toeF=-.1;else toeR=.1;
  toeF-=eOff*.02;toeR+=ctrl*.05;toeF=fmt(clamp(toeF,-.5,.5));toeR=fmt(clamp(toeR,-.2,.5));
  const casterB=ep==="Rear"?6:ep==="Mid"?5.8:5.5,caster=fmt(casterB+ctrl*.5);
  const ptw=hp/Math.max(weightLbs,1);
  const arch=getArchetype(ep,dt,ptw);
  const camF=fmt(scaleCamberForCompound(arch.camberF,tc));
  const camR=fmt(scaleCamberForCompound(arch.camberR,tc));
  const pressF=snap5(scalePressureForCompound(arch.pressF,tc));
  const pressR=snap5(scalePressureForCompound(arch.pressR,tc));
  const pressConf=arch.conf;
  const camberConf=(tc==="Slicks")?arch.conf:"theory";
  let bb=clamp(Math.round(wF+2-eOff*.5),48,60);
  const bp2=tc==="Slicks"?97:tc==="Race"?98:100;
  const pl=hpw>=.35?"high":hpw>=.2?"mid":"low";
  let diff={};
  if(dt==="RWD"){let a={low:55,mid:45,high:38}[pl],d2={low:15,mid:12,high:10}[pl];if(ep==="Mid"){a-=3;d2-=2}if(ep==="Rear"){a-=5;d2-=3}if(tc==="Slicks")a-=5;if(tc==="Race")a-=2;a+=Math.round(twR*5);a-=Math.round(xOff*.6);d2-=Math.round(xOff*.2);a-=ctrl*5;d2-=ctrl*2;diff={rearAccel:clamp(a,20,70),rearDecel:clamp(d2,5,25)}}
  else if(dt==="FWD"){let fa={low:35,mid:30,high:25}[pl]-ctrl*3;diff={frontAccel:clamp(fa,15,45),frontDecel:8}}
  else{const ra2={low:50,mid:42,high:35}[pl]-(tc==="Slicks"?5:0)-ctrl*4,fa2={low:30,mid:25,high:20}[pl]-(tc==="Slicks"?3:0)-ctrl*2;diff={center:wR>=55?70:wR>=50?65:60,frontAccel:clamp(fa2,15,45),frontDecel:8,rearAccel:clamp(ra2-Math.round(xOff*.6),25,65),rearDecel:12}}
  let aero=null;
  if(hasAero){if(dt==="RWD")aero={f:"40-45%",r:"55-65%"};else if(dt==="FWD")aero={f:"55-60%",r:"35-45%"};else aero={f:"45-50%",r:"50-55%"}}
  return{springs:{fPct:fS,rPct:rS},arb:{fPct:fA,rPct:rA},damp:{rbF,rbR,bpF,bpR},ride:{f:hasAero?.3:.15,r:hasAero?.35:.18},align:{camF,camR,toeF,toeR,caster,camberConf},diff,brakes:{balance:bb,pressure:bp2},pressF,pressR,pressConf,aero,meta:{hpw:Math.round(hpw*1000)/1000,pl,wR,arch,ptw}}
}

function calcGearing(dyno,nG,tgtSpd,dt){
  const{peakHpRpm,peakTqRpm,redline,powerClimb,powerFalloff}=dyno;
  if(!redline||!peakHpRpm||!peakTqRpm||!tgtSpd)return null;
  const pbLow=powerClimb||Math.max(peakTqRpm*.85,redline*.3),pbHigh=powerFalloff||Math.min(peakHpRpm+500,redline);
  const shiftRpm=clamp(Math.round(pbHigh),pbLow+500,redline-100);
  const sp=(redline*TIRE_K)/tgtSpd;
  let fg=({RWD:3.2,FWD:3,AWD:2.8})[dt]||3,tTG=.8,fd=sp/tTG;
  if(fd>6){fd=6;tTG=sp/fd}else if(fd<2){fd=2;tTG=sp/fd}
  tTG=clamp(tTG,.5,2.5);
  let K=Math.pow(tTG/fg,1/(nG-1));
  if(K<.6){fg=clamp(tTG/Math.pow(.6,nG-1),1.5,5);K=Math.pow(tTG/fg,1/(nG-1))}
  else if(K>.92){fg=clamp(tTG/Math.pow(.92,nG-1),1.5,5);K=Math.pow(tTG/fg,1/(nG-1))}
  const ratios=[];for(let i=0;i<nG;i++)ratios.push(fmtG(fg*Math.pow(K,i)));
  const aT=ratios[ratios.length-1];fd=fmtG(clamp((redline*TIRE_K)/(tgtSpd*aT),2,6));
  const sPs=ratios.slice(0,-1).map((r,i)=>({gear:i+1,shiftAt:shiftRpm,dropTo:Math.round(shiftRpm*(ratios[i+1]/r))}));
  const lRpm=Math.round(peakTqRpm*({RWD:.65,FWD:.8,AWD:.85}[dt]||.7));
  const cTS=Math.round((redline*TIRE_K)/(aT*fd));
  return{ratios,finalDrive:fd,shiftPoints:sPs,shiftPoint:shiftRpm,launchRpm:lRpm,pbLow:Math.round(pbLow),pbHigh:Math.round(pbHigh),K:fmtG(K),calcTopSpeed:cTS}
}

function loadTunes(){try{return JSON.parse(localStorage.getItem("fh5-tunes"))||[]}catch{return[]}}
function saveTunes(t){try{localStorage.setItem("fh5-tunes",JSON.stringify(t.slice(0,50)))}catch(e){console.error(e)}}

function recalcForTune(t){
  const ch=calcChassis(t.inp,t.eOff||0,t.xOff||0);
  const ge=calcGearing(t.dyno,t.nG,t.tgtSpd,t.inp.drivetrain);
  return{ch,ge};
}

function getTuneOutputs(t){
  const ch=calcChassis(t.inp,t.eOff||0,t.xOff||0);
  const r=t.ranges||{};
  return{
    springF:fmt(calcVal(r.sFMn||200,r.sFMx||800,ch.springs.fPct)),
    springR:fmt(calcVal(r.sRMn||200,r.sRMx||800,ch.springs.rPct)),
    arbF:fmt(calcVal(r.aFMn||1,r.aFMx||65,ch.arb.fPct)),
    arbR:fmt(calcVal(r.aRMn||1,r.aRMx||65,ch.arb.rPct)),
    reboundF:fmt(calcVal(r.rbFMn||1,r.rbFMx||20,ch.damp.rbF)),
    reboundR:fmt(calcVal(r.rbRMn||1,r.rbRMx||20,ch.damp.rbR)),
    bumpF:fmt(calcVal(r.bpFMn||1,r.bpFMx||20,ch.damp.bpF)),
    bumpR:fmt(calcVal(r.bpRMn||1,r.bpRMx||20,ch.damp.bpR)),
    camF:ch.align.camF,camR:ch.align.camR,
    toeF:ch.align.toeF,toeR:ch.align.toeR,
    caster:ch.align.caster,
    pressF:ch.pressF,pressR:ch.pressR,
    brakeBalance:ch.brakes.balance,brakePressure:ch.brakes.pressure,
    diff:ch.diff,
    entryOff:t.eOff||0,exitOff:t.xOff||0
  };
}

function computeTrends(tunes){
  const defaultRanges={sFMn:200,sFMx:800,sRMn:200,sRMx:800,aFMn:1,aFMx:65,aRMn:1,aRMx:65,rbFMn:1,rbFMx:20,rbRMn:1,rbRMx:20,bpFMn:1,bpFMx:20,bpRMn:1,bpRMx:20};
  const entryOffsets=[],exitOffsets=[],rangeDeltas={};
  tunes.forEach(t=>{
    if(t.eOff)entryOffsets.push(t.eOff);
    if(t.xOff)exitOffsets.push(t.xOff);
    const r=t.ranges||{};
    Object.keys(defaultRanges).forEach(k=>{
      if(r[k]!==undefined&&r[k]!==defaultRanges[k]){
        if(!rangeDeltas[k])rangeDeltas[k]=[];
        rangeDeltas[k].push({car:t.car||t.name,val:r[k],def:defaultRanges[k]});
      }
    });
  });
  const avgEntry=entryOffsets.length?Math.round(entryOffsets.reduce((a,b)=>a+b,0)/entryOffsets.length*10)/10:0;
  const avgExit=exitOffsets.length?Math.round(exitOffsets.reduce((a,b)=>a+b,0)/exitOffsets.length*10)/10:0;
  const archetypes={};
  tunes.forEach(t=>{
    if(!t.inp)return;
    const ptw=t.inp.hp/Math.max(t.inp.weightLbs,1);
    const tier=ptw>=HIGH_PTW?"High":"Low";
    const key=t.inp.enginePos+"-"+t.inp.drivetrain+"-"+tier;
    if(!archetypes[key])archetypes[key]={count:0,tunes:[]};
    archetypes[key].count++;
    archetypes[key].tunes.push(t.car||t.name);
  });
  return{avgEntry,avgExit,entryCount:entryOffsets.length,exitCount:exitOffsets.length,rangeDeltas,archetypes};
}

// ── DYNO SCAN ────────────────────────────────────────────────────────────────
const SCAN_INSTRUCTION="You are reading a Forza Horizon 5 in-game dyno graph screenshot. Extract exactly 5 values by reading the graph axes and curve peaks:\n- peakHp: peak horsepower (pink/red curve peak, Y-axis number)\n- peakHpRpm: RPM at peak HP (X-axis)\n- peakTq: peak torque lb-ft (yellow/white curve, Y-axis number)\n- peakTqRpm: RPM at peak torque (X-axis)\n- redline: maximum RPM shown on X-axis\n\nReturn ONLY a raw JSON object. No markdown. No backticks. No words.\nExample: {\"peakHp\":650,\"peakHpRpm\":7200,\"peakTq\":480,\"peakTqRpm\":5000,\"redline\":8500}\n\nIf a value is unreadable use 0. Round HP/TQ to nearest 10. Round RPM to nearest 100.";

async function scanDynoImage(b64,mediaType){
  let resp,data;
  try{
    resp=await fetch("https://fh5-proxy.allaboutmygoodsense.workers.dev",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:300,
        messages:[
          {role:"user",content:SCAN_INSTRUCTION},
          {role:"assistant",content:"Understood. Send the screenshot and I will return only the JSON."},
          {role:"user",content:[
            {type:"image",source:{type:"base64",media_type:mediaType,data:b64}},
            {type:"text",text:"Read this FH5 dyno graph and return the JSON."}
          ]}
        ]
      })
    });
  }catch(e){throw new Error("Network error: "+e.message);}
  let rawBody="";
  try{rawBody=await resp.text();data=JSON.parse(rawBody);}
  catch(e){throw new Error("Response not JSON (HTTP "+resp.status+"): "+rawBody.slice(0,200));}
  if(!resp.ok||data.error)throw new Error("API error: "+(data.error?.message||"HTTP "+resp.status));
  const text=(data.content||[]).map(b=>b.text||"").join("").trim();
  if(!text)throw new Error("Empty response from API");
  const clean=text.replace(/```json\s*/g,"").replace(/```/g,"").trim();
  let parsed;
  try{parsed=JSON.parse(clean);}
  catch(e){throw new Error("Parse failed. Claude returned: "+clean);}
  return parsed;
}

// Resize image to max 1200px wide before encoding — keeps payload fast
function resizeAndEncode(file){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      const MAX=1200;
      let w=img.width,h=img.height;
      if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
      const canvas=document.createElement("canvas");
      canvas.width=w;canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      const dataUrl=canvas.toDataURL("image/jpeg",0.88);
      resolve({b64:dataUrl.split(",")[1],mediaType:"image/jpeg"});
    };
    img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error("Could not load image"));};
    img.src=url;
  });
}

function NumIn({label,value,onChange,min:mn=0,max:mx=99999,w}){
  const[d,setD]=useState(String(value)),foc=useRef(false),lc=useRef(value);
