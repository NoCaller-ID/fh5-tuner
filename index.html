<script>
const{useState,useMemo,useRef,useEffect,useCallback}=React;
const h=React.createElement;
const DRIVETRAINS=["RWD","FWD","AWD"],ENGINE_POS=["Front","Mid","Rear"],TIRES=["Street","Sport","Race","Slicks"],ASPIRATIONS=["NA","Turbo","Twin Turbo","Supercharged"],GEAR_COUNTS=[4,5,6,7,8],TIRE_K=0.0744;
const GEAR_RANGES={1:[2,5],2:[1.5,3.5],3:[1,2.5],4:[0.8,2],5:[0.6,1.5],6:[0.5,1.2],7:[0.5,1],8:[0.5,0.9],FD:[2,6]};
const C={bg:"#0a0608",card:"#120d10",border:"#2a1f26",pink:"#ff2d8a",gold:"#d4a857",hotPink:"#ff69b4",neon:"#ff44aa",purple:"#9b30ff",chrome:"#c0c0c0",dim:"#5a4050",dimmer:"#3a2a32",text:"#f0e6ec",sub:"#7a6070",hp:"#ff2d8a",tq:"#d4a857",green:"#44cc66",red:"#ff4444",blue:"#4488ff",cyan:"#22cccc"};
const GP={pink:"linear-gradient(135deg,#ff2d8a,#ff69b4,#d4a857)",flat:"linear-gradient(135deg,#ff2d8a,#ff44aa)",gold:"linear-gradient(135deg,#d4a857,#f0d48a)",neon:"linear-gradient(90deg,#ff2d8a,#9b30ff)",blue:"linear-gradient(135deg,#4488ff,#2266cc)"};
function clamp(v,lo,hi){return Math.min(hi,Math.max(lo,v))}
function pct(v){return Math.round(v*100)}
function fmt(v){return Math.round(v*10)/10}
function fmtG(v){return Math.round(v*100)/100}
function calcVal(mn,mx,p){return mn+(mx-mn)*p}
function twMod(w){return(w-245)/245}
function snap5(v){return Math.round(v*2)/2}
const HIGH_PTW=0.28;
const ASP_MULT={"NA":0.65,"Turbo":0.48,"Twin Turbo":0.45,"Supercharged":0.55};
function deriveTqRpm(redline,asp){return Math.round((redline*(ASP_MULT[asp]||0.65))/100)*100}
function loadSettings(){try{return JSON.parse(localStorage.getItem("fh5-settings"))||{tqSource:"SCAN"}}catch{return{tqSource:"SCAN"}}}
function saveSettings(s){try{localStorage.setItem("fh5-settings",JSON.stringify(s))}catch(e){console.error(e)}}

// v9.8: aero/noaero split across all archetypes
// Tested: Front_RWD_high_aero (camberR -0.8), Front_RWD_high_noaero (camberR -1.3)
// Front_AWD_low_noaero (R34), Mid_RWD_high_noaero (765LT), Mid_RWD_low_noaero (Cayman)
// Aero variants: theory, camberR ~0.1-0.2 softer than noaero (downforce = more vertical load)
function getArchetype(ep,dt,ptw,hasAero){
  const tier=ptw>=HIGH_PTW?"high":"low";
  const sfx=hasAero?"_aero":"_noaero";
  const key=ep+"_"+dt+"_"+tier+sfx;
  const map={
    "Front_RWD_high_aero":   {camberF:-1.2,camberR:-0.8, pressF:24.0,pressR:25.0,conf:"tested"},
    "Front_RWD_high_noaero": {camberF:-1.2,camberR:-1.3, pressF:24.0,pressR:25.0,conf:"tested"},
    "Front_RWD_low_aero":    {camberF:-1.2,camberR:-1.0, pressF:25.5,pressR:26.0,conf:"theory"},
    "Front_RWD_low_noaero":  {camberF:-1.2,camberR:-1.1, pressF:25.5,pressR:26.0,conf:"theory"},
    "Front_AWD_low_aero":    {camberF:-1.2,camberR:-0.9, pressF:26.5,pressR:26.5,conf:"theory"},
    "Front_AWD_low_noaero":  {camberF:-1.2,camberR:-1.0, pressF:26.5,pressR:26.5,conf:"tested"},
    "Front_AWD_high_aero":   {camberF:-1.2,camberR:-1.0, pressF:26.0,pressR:26.0,conf:"theory"},
    "Front_AWD_high_noaero": {camberF:-1.3,camberR:-1.1, pressF:26.0,pressR:26.0,conf:"theory"},
    "Front_FWD_high_aero":   {camberF:-1.3,camberR:-0.7, pressF:25.0,pressR:27.0,conf:"theory"},
    "Front_FWD_high_noaero": {camberF:-1.4,camberR:-0.8, pressF:25.0,pressR:27.0,conf:"theory"},
    "Front_FWD_low_aero":    {camberF:-1.1,camberR:-0.7, pressF:26.0,pressR:27.0,conf:"theory"},
    "Front_FWD_low_noaero":  {camberF:-1.2,camberR:-0.8, pressF:26.0,pressR:27.0,conf:"theory"},
    "Mid_RWD_high_aero":     {camberF:-1.4,camberR:-1.2, pressF:23.0,pressR:23.0,conf:"theory"},
    "Mid_RWD_high_noaero":   {camberF:-1.5,camberR:-1.3, pressF:23.0,pressR:23.0,conf:"tested"},
    "Mid_RWD_low_aero":      {camberF:-1.1,camberR:-0.9, pressF:27.5,pressR:27.5,conf:"theory"},
    "Mid_RWD_low_noaero":    {camberF:-1.2,camberR:-1.0, pressF:27.5,pressR:27.5,conf:"tested"},
    "Mid_AWD_high_aero":     {camberF:-1.3,camberR:-1.1, pressF:24.0,pressR:24.0,conf:"theory"},
    "Mid_AWD_high_noaero":   {camberF:-1.4,camberR:-1.2, pressF:24.0,pressR:24.0,conf:"theory"},
    "Mid_AWD_low_aero":      {camberF:-1.1,camberR:-0.9, pressF:26.5,pressR:26.5,conf:"theory"},
    "Mid_AWD_low_noaero":    {camberF:-1.2,camberR:-1.0, pressF:26.5,pressR:26.5,conf:"theory"},
    "Mid_FWD_high_aero":     {camberF:-1.4,camberR:-0.7, pressF:24.0,pressR:26.0,conf:"theory"},
    "Mid_FWD_high_noaero":   {camberF:-1.5,camberR:-0.8, pressF:24.0,pressR:26.0,conf:"theory"},
    "Mid_FWD_low_aero":      {camberF:-1.2,camberR:-0.7, pressF:26.0,pressR:27.0,conf:"theory"},
    "Mid_FWD_low_noaero":    {camberF:-1.3,camberR:-0.8, pressF:26.0,pressR:27.0,conf:"theory"},
    "Rear_RWD_high_aero":    {camberF:-1.2,camberR:-1.3, pressF:24.0,pressR:23.5,conf:"theory"},
    "Rear_RWD_high_noaero":  {camberF:-1.3,camberR:-1.4, pressF:24.0,pressR:23.5,conf:"theory"},
    "Rear_RWD_low_aero":     {camberF:-1.0,camberR:-1.1, pressF:26.5,pressR:26.0,conf:"theory"},
    "Rear_RWD_low_noaero":   {camberF:-1.1,camberR:-1.2, pressF:26.5,pressR:26.0,conf:"theory"},
    "Rear_AWD_high_aero":    {camberF:-1.2,camberR:-1.2, pressF:24.0,pressR:24.0,conf:"theory"},
    "Rear_AWD_high_noaero":  {camberF:-1.3,camberR:-1.3, pressF:24.0,pressR:24.0,conf:"theory"},
    "Rear_AWD_low_aero":     {camberF:-1.0,camberR:-1.0, pressF:26.5,pressR:26.5,conf:"theory"},
    "Rear_AWD_low_noaero":   {camberF:-1.1,camberR:-1.1, pressF:26.5,pressR:26.5,conf:"theory"},
    "Rear_FWD_high_aero":    {camberF:-1.3,camberR:-0.7, pressF:24.5,pressR:26.5,conf:"theory"},
    "Rear_FWD_high_noaero":  {camberF:-1.4,camberR:-0.8, pressF:24.5,pressR:26.5,conf:"theory"},
    "Rear_FWD_low_aero":     {camberF:-1.1,camberR:-0.7, pressF:26.0,pressR:27.0,conf:"theory"},
    "Rear_FWD_low_noaero":   {camberF:-1.2,camberR:-0.8, pressF:26.0,pressR:27.0,conf:"theory"}
  };
  return map[key]||{camberF:-1.2,camberR:-1.1,pressF:26.0,pressR:26.5,conf:"theory"};
}
function scaleCamber(base,tc){if(tc==="Slicks")return base;if(tc==="Race")return base-0.1;if(tc==="Sport")return base-0.2;return base-0.3;}
function scalePress(base,tc){if(tc==="Slicks")return base;if(tc==="Race")return base+0.5;if(tc==="Sport")return base+2.0;return base+3.5;}

// v9.8 SUSPENSION FORMULAS
// SPRINGS: natural frequency method  k=(2*pi*f)^2 * cornerWeight / 386  [lb/in]
// Validated: Front_RWD_high S1 slicks -> F:365 R:435 @ 2.75Hz, F/R ratio 1.19 (rear stiffer)
const FREQ_BASE={"Street":1.5,"Sport":2.0,"Race":2.5,"Slicks":2.75};
function springFreq(tc,hasAero,dt){
  let f=FREQ_BASE[tc]||2.0;
  if(hasAero)f+=0.15;
  if(dt==="AWD")f+=0.10;
  return f;
}
function calcSpringPcts(weightLbs,weightFront,tc,hasAero,dt,ep,sFMn,sFMx,sRMn,sRMx){
  const wF=weightFront/100,cwF=(weightLbs*wF)/2;
  const freq=springFreq(tc,hasAero,dt);
  const kF=Math.pow(2*Math.PI*freq,2)*cwF/386;
  let frRatio=1.0;
  if(ep==="Front"){frRatio=dt==="RWD"?1.19:dt==="AWD"?1.05:0.92;}
  else if(ep==="Mid"){frRatio=dt==="RWD"?1.08:dt==="AWD"?1.03:0.90;}
  else{frRatio=dt==="RWD"?1.00:dt==="AWD"?0.98:0.88;}
  const kR=kF*frRatio;
  return{
    fPct:sFMx>sFMn?clamp((kF-sFMn)/(sFMx-sFMn),0.05,0.95):0.5,
    rPct:sRMx>sRMn?clamp((kR-sRMn)/(sRMx-sRMn),0.05,0.95):0.5
  };
}

// ARBs: anchored F:60 R:35 [Tested] Front_RWD_high on std 1-65 range
function calcArbPcts(dt,ep,ptw,tc,hasAero,aFMn,aFMx,aRMn,aRMx){
  let aF=60,aR=35;
  if(dt==="FWD"){aF*=0.80;aR*=1.10;}
  else if(dt==="AWD"){aF*=0.90;aR*=0.95;}
  if(ep==="Mid"){aF*=0.92;aR*=1.05;}
  else if(ep==="Rear"){aF*=0.85;aR*=1.10;}
  if(ptw<HIGH_PTW){aF*=0.88;aR*=0.92;}
  if(tc==="Race"){aF*=0.97;aR*=0.97;}
  else if(tc==="Sport"){aF*=0.92;aR*=0.92;}
  else if(tc==="Street"){aF*=0.85;aR*=0.85;}
  if(hasAero){aF*=1.03;aR*=1.03;}
  const spanF=aFMx-aFMn,spanR=aRMx-aRMn;
  return{
    fPct:spanF>0?clamp((aF-aFMn)/spanF,0.05,0.95):0.5,
    rPct:spanR>0?clamp((aR-aRMn)/spanR,0.05,0.95):0.5
  };
}

// Dampers: anchored Reb F:2 R:5 Bump F:1 R:3 [Tested] Front_RWD_high on 1-20 range
// Old formula was outputting ~12/11.6/7.1/6.8 — massively overshooting
function calcDampPcts(dt,ep,ptw,tc,hasAero,weightLbs,rbFMn,rbFMx,rbRMn,rbRMx,bpFMn,bpFMx,bpRMn,bpRMx){
  let rbF=2,rbR=5,bpF=1,bpR=3;
  const wScale=clamp(weightLbs/2758,0.7,1.6);
  rbF*=wScale;rbR*=wScale;bpF*=wScale;bpR*=wScale;
  if(dt==="FWD"){rbF*=1.10;bpF*=1.10;}
  else if(dt==="AWD"){rbF*=1.05;rbR*=1.05;bpF*=1.05;bpR*=1.05;}
  if(ep==="Mid"){rbR*=1.10;bpR*=1.05;}
  else if(ep==="Rear"){rbR*=1.15;bpR*=1.10;rbF*=0.92;}
  if(tc==="Race"){rbF*=1.10;rbR*=1.10;bpF*=1.10;bpR*=1.10;}
  else if(tc==="Sport"){rbF*=1.20;rbR*=1.20;bpF*=1.15;bpR*=1.15;}
  else if(tc==="Street"){rbF*=1.35;rbR*=1.35;bpF*=1.25;bpR*=1.25;}
  if(hasAero){bpF*=1.05;bpR*=1.05;}
  if(ptw<HIGH_PTW){rbF*=1.08;rbR*=1.08;bpF*=1.05;bpR*=1.05;}
  const toP=(v,mn,mx)=>mx>mn?clamp((v-mn)/(mx-mn),0.05,0.95):0.5;
  return{rbF:toP(rbF,rbFMn,rbFMx),rbR:toP(rbR,rbRMn,rbRMx),bpF:toP(bpF,bpFMn,bpFMx),bpR:toP(bpR,bpRMn,bpRMx)};
}

function calcChassis(inp,eOff,xOff,ranges){
  const{weightFront:wF,hp,weightLbs,drivetrain:dt,enginePos:ep,tireCompound:tc,hasAero,tireWidthF,tireWidthR,isController}=inp;
  const wR=100-wF,hpw=hp/Math.max(weightLbs,1),twR=twMod(tireWidthR||275),ctrl=isController?1:0;
  const r=ranges||{};
  const sFMn=r.sFMn||200,sFMx=r.sFMx||800,sRMn=r.sRMn||200,sRMx=r.sRMx||800;
  const aFMn=r.aFMn||1,aFMx=r.aFMx||65,aRMn=r.aRMn||1,aRMx=r.aRMx||65;
  const rbFMn=r.rbFMn||1,rbFMx=r.rbFMx||20,rbRMn=r.rbRMn||1,rbRMx=r.rbRMx||20;
  const bpFMn=r.bpFMn||1,bpFMx=r.bpFMx||20,bpRMn=r.bpRMn||1,bpRMx=r.bpRMx||20;
  const ptw=hp/Math.max(weightLbs,1);
  const isTestedArch=(ep==="Front"&&dt==="RWD"&&ptw>=HIGH_PTW);

  const sp=calcSpringPcts(weightLbs,wF,tc,hasAero,dt,ep,sFMn,sFMx,sRMn,sRMx);
  const arb=calcArbPcts(dt,ep,ptw,tc,hasAero,aFMn,aFMx,aRMn,aRMx);
  const damp=calcDampPcts(dt,ep,ptw,tc,hasAero,weightLbs,rbFMn,rbFMx,rbRMn,rbRMx,bpFMn,bpFMx,bpRMn,bpRMx);

  let toeF=0,toeR=0;
  if(dt==="RWD")toeR=.1;else if(dt==="FWD")toeF=-.1;else toeR=.1;
  toeF-=eOff*.02;toeR+=ctrl*.05;toeF=fmt(clamp(toeF,-.5,.5));toeR=fmt(clamp(toeR,-.2,.5));
  const casterB=ep==="Rear"?6:ep==="Mid"?5.8:5.5,caster=fmt(casterB+ctrl*.5);
  const arch=getArchetype(ep,dt,ptw,hasAero);
  const camF=fmt(scaleCamber(arch.camberF,tc)),camR=fmt(scaleCamber(arch.camberR,tc));
  const pressF=snap5(scalePress(arch.pressF,tc)),pressR=snap5(scalePress(arch.pressR,tc));
  const camberConf=(tc==="Slicks")?arch.conf:"theory";

  let bb=clamp(Math.round(wF+2-eOff*.5),48,60);
  const bp2=tc==="Slicks"?97:tc==="Race"?98:100;

  const pl=hpw>=.35?"high":hpw>=.2?"mid":"low";
  let diff={},diffConf="theory";
  if(dt==="RWD"){
    let a,d2;
    if(pl==="high"){
      if(hasAero){a=67;d2=20;diffConf="tested";}
      else{a=90;d2=15;diffConf="tested";}
    }else{
      a={mid:45,low:55}[pl];d2={mid:12,low:15}[pl];
      if(ep==="Mid"){a-=3;d2-=2}if(ep==="Rear"){a-=5;d2-=3}
      if(tc==="Slicks")a-=5;if(tc==="Race")a-=2;a+=Math.round(twR*5);
    }
    a-=Math.round(xOff*.6);d2-=Math.round(xOff*.2);a-=ctrl*5;d2-=ctrl*2;
    diff={rearAccel:clamp(a,20,97),rearDecel:clamp(d2,5,25)};
  }else if(dt==="FWD"){
    const fa={low:35,mid:30,high:25}[pl]-ctrl*3;
    diff={frontAccel:clamp(fa,15,45),frontDecel:8};
  }else{
    const ra2={low:50,mid:42,high:35}[pl]-(tc==="Slicks"?5:0)-ctrl*4;
    const fa2={low:30,mid:25,high:20}[pl]-(tc==="Slicks"?3:0)-ctrl*2;
    diff={center:wR>=55?70:wR>=50?65:60,frontAccel:clamp(fa2,15,45),frontDecel:8,rearAccel:clamp(ra2-Math.round(xOff*.6),25,65),rearDecel:12};
  }

  let aero=null;
  if(hasAero){if(dt==="RWD")aero={fPct:0.42,rPct:0.60};else if(dt==="FWD")aero={fPct:0.57,rPct:0.40};else aero={fPct:0.47,rPct:0.52};}

  return{
    springs:{fPct:sp.fPct,rPct:sp.rPct},
    arb:{fPct:arb.fPct,rPct:arb.rPct},
    damp:{rbF:damp.rbF,rbR:damp.rbR,bpF:damp.bpF,bpR:damp.bpR},
    ride:{f:hasAero?.3:.15,r:hasAero?.35:.18},
    align:{camF,camR,toeF,toeR,caster,camberConf},
    diff,diffConf,brakes:{balance:bb,pressure:bp2},
    pressF,pressR,pressConf:arch.conf,aero,
    meta:{pl,wR,ptw},
    conf:{spring:isTestedArch?"tested":"theory",arb:isTestedArch?"tested":"theory",damp:isTestedArch?"tested":"theory"}
  };
}
function calcGearing(dyno,nG,tgtSpd,dt){
  const{peakHpRpm,peakTqRpm,redline,powerClimb,powerFalloff}=dyno;
  if(!redline||!peakHpRpm||!peakTqRpm||!tgtSpd)return null;
  const pbLow=powerClimb||Math.max(peakTqRpm*.85,redline*.3),pbHigh=powerFalloff||Math.min(peakHpRpm+500,redline);
  const shiftRpm=clamp(Math.round(pbHigh),pbLow+500,redline-100);
  let fg={RWD:3.2,FWD:3.0,AWD:2.8}[dt]||3.0;
  const sp=(redline*TIRE_K)/tgtSpd;let tTG=.8,fd=sp/tTG;
  if(fd>6){fd=6;tTG=sp/fd}else if(fd<2){fd=2;tTG=sp/fd}
  tTG=clamp(tTG,.5,2.5);
  let K=Math.pow(tTG/fg,1/(nG-1));
  if(K<.6){fg=clamp(tTG/Math.pow(.6,nG-1),1.5,5);K=Math.pow(tTG/fg,1/(nG-1))}
  else if(K>.92){fg=clamp(tTG/Math.pow(.92,nG-1),1.5,5);K=Math.pow(tTG/fg,1/(nG-1))}
  const ratios=[];for(let i=0;i<nG;i++)ratios.push(fmtG(fg*Math.pow(K,i)));
  const aT=ratios[ratios.length-1];fd=fmtG(clamp((redline*TIRE_K)/(tgtSpd*aT),2,6));
  const sPs=ratios.slice(0,-1).map((r,i)=>({gear:i+1,dropTo:Math.round(shiftRpm*(ratios[i+1]/r))}));
  const lRpm=Math.round(peakTqRpm*({RWD:.65,FWD:.8,AWD:.85}[dt]||.7));
  const Kf=fmtG(K);
  const spreadLabel=Kf<0.72?"WIDE":Kf<=0.80?"BALANCED":Kf<=0.87?"TIGHT":"VERY TIGHT";
  const spreadColor=Kf<0.72?C.blue:Kf<=0.80?C.gold:Kf<=0.87?C.cyan:C.pink;
  return{ratios,finalDrive:fd,shiftPoints:sPs,shiftPoint:shiftRpm,launchRpm:lRpm,K:Kf,spreadLabel,spreadColor,calcTopSpeed:Math.round((redline*TIRE_K)/(aT*fd))};
}
function loadTunes(){try{return JSON.parse(localStorage.getItem("fh5-tunes"))||[]}catch{return[]}}
function saveTunes(t){try{localStorage.setItem("fh5-tunes",JSON.stringify(t.slice(0,50)))}catch(e){}}
function getTuneOutputs(t){
  const ch=calcChassis(t.inp,t.eOff||0,t.xOff||0,t.ranges||{});
  const r=t.ranges||{};
